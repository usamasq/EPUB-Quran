name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint Quran source maps
        run: python scripts/lint_quran_source.py

      - name: Build all EPUB variants
        run: python scripts/quran_reader_pro.py --legacy-copy

      - name: Run EPUB regression checks
        run: python scripts/check_epub_regressions.py

      - name: Optional Kindle Previewer check
        run: python scripts/check_kindle_previewer.py

      - name: Setup Java (for epubcheck)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download epubcheck
        run: |
          curl -L -o epubcheck.zip https://github.com/w3c/epubcheck/releases/download/v5.1.0/epubcheck-5.1.0.zip
          unzip -q epubcheck.zip -d .tools

      - name: Validate EPUB files with epubcheck
        run: |
          for f in releases/*.epub; do
            echo "Checking $f"
            java -jar .tools/epubcheck-5.1.0/epubcheck.jar "$f"
          done
