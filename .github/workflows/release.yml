name: Release EPUB

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to publish or refresh assets for (e.g. v1.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint Quran source maps
        run: python scripts/lint_quran_source.py

      - name: Build all EPUB variants
        run: python scripts/quran_reader_pro.py

      - name: Run EPUB regression checks
        run: python scripts/check_epub_regressions.py

      - name: Optional Kindle Previewer check
        run: python scripts/check_kindle_previewer.py

      - name: Setup Java (for epubcheck)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download epubcheck
        run: |
          curl -L -o epubcheck.zip https://github.com/w3c/epubcheck/releases/download/v5.1.0/epubcheck-5.1.0.zip
          unzip -q epubcheck.zip -d .tools

      - name: Validate EPUB files with epubcheck
        run: |
          for f in releases/*.epub; do
            echo "Checking $f"
            java -jar .tools/epubcheck-5.1.0/epubcheck.jar "$f"
          done

      - name: Generate checksums
        run: sha256sum releases/*.epub > releases/SHA256SUMS.txt

      - name: Remove legacy asset from release tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}";
            try {
              const rel = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              const legacy = (rel.data.assets || []).find(a => a.name === "Holy_Quran.epub");
              if (legacy) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: legacy.id
                });
                core.info(`Deleted legacy asset Holy_Quran.epub from tag ${tag}`);
              } else {
                core.info(`No legacy asset found on tag ${tag}`);
              }
            } catch (e) {
              core.info(`Release not found yet for tag ${tag}, continuing.`);
            }

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
          files: |
            releases/*.epub
            releases/SHA256SUMS.txt
          draft: false
          prerelease: false
          generate_release_notes: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
